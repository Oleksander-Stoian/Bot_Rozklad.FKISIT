version: '3.8'

services:
  bot:
    build: .
    container_name: telegram_bot
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./:/app  # Бот читає розклад звідси

  web:
    build: ./web
    container_name: admin_panel
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./:/data # Панель зберігає оновлений розклад сюди

  redis:
    image: redis:7-alpine
    container_name: redis_bot
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 # Зберігаємо сесії, щоб не вилітало

volumes:
  redis_data: